# Production stack — self-hosted PostgreSQL.
#
#   docker compose -f compose.prod.yaml up -d --build
#
# Differences from the dev stack (compose.yaml):
#   - Postgres and Redis publish NO host ports; they are reachable only on the
#     internal compose network. Dev exposes 5432/6379 for tooling.
#   - Every secret is required. Compose refuses to start rather than falling
#     back to a well-known default, so a missing .env can never silently ship
#     "dev-secret-change-me" to production.
#   - Uploads live on a named volume. public/uploads is written at runtime and
#     would otherwise be lost on every image rebuild.
#   - The app has a healthcheck; /api/health returns 503 when the DB is down.
#
# Container names match scripts/backup.sh defaults (bodo_db_prod).

services:
  db:
    image: postgres:16-alpine
    container_name: bodo_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: bodo_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bodo_app_prod
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      AUTH_URL: ${NEXTAUTH_URL}
      AUTH_TRUST_HOST: 'true'
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?NEXT_PUBLIC_SITE_URL is required}
      # Required: without it hashUA falls back to unsalted sha256(user-agent),
      # which is trivially reversible for common UA strings.
      ANALYTICS_SALT: ${ANALYTICS_SALT:?ANALYTICS_SALT is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      POSTAL_WEBHOOK_SECRET: ${POSTAL_WEBHOOK_SECRET:-}
      # Seeding overwrites site content. Never default this to true in prod.
      RUN_SEED_ON_START: ${RUN_SEED_ON_START:-false}
    volumes:
      - uploads_prod_data:/app/public/uploads
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_prod_data:
  redis_prod_data:
  uploads_prod_data:
