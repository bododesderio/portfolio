<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1c"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <radialGradient id="halo" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgb(201 168 76 / 0.3)"/>
      <stop offset="65%" stop-color="rgb(201 168 76 / 0)"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#halo)"/>
  <!-- Top red band (NDC) -->
  <rect x="0" y="0" width="800" height="80" fill="#e11d48"/>
  <text x="400" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#ffffff" letter-spacing="4">ESSAY  •  VNSAC234</text>
  <!-- Headline block -->
  <rect x="60" y="140" width="680" height="110" fill="#e11d48" rx="6"/>
  <text x="400" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#ffffff">Corruption: The Rot That Has</text>
  <text x="400" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#ffffff">Infected Uganda&apos;s Health Sector.</text>
  <!-- Author block -->
  <line x1="60" y1="720" x2="200" y2="720" stroke="rgb(201 168 76)" stroke-width="3"/>
  <text x="60" y="770" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#e11d48">BODO DESDERIO</text>
  <text x="60" y="800" font-family="sans-serif" font-size="16" fill="#e5e5e5">Kampala International University</text>
  <text x="60" y="820" font-family="sans-serif" font-size="16" fill="#e5e5e5">Year Two</text>
  <!-- Footer -->
  <rect x="0" y="940" width="800" height="60" fill="#0a0a0b"/>
  <text x="400" y="976" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgb(255 255 255 / 0.5)" letter-spacing="3">
    PLACEHOLDER POSTER — REPLACE WITH SCAN OF ORIGINAL
  </text>
</svg>
