<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="50%" stop-color="#1a1c25"/>
      <stop offset="100%" stop-color="#0d0e12"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(201,168,76,0.12)"/>
      <stop offset="100%" stop-color="rgba(201,168,76,0)"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="accent" cx="30%" cy="60%" r="40%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.08)"/>
      <stop offset="100%" stop-color="rgba(99,102,241,0)"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect width="1920" height="1080" fill="url(#accent)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <!-- Diagonal geometric lines -->
  <line x1="0" y1="300" x2="800" y2="0" stroke="rgba(201,168,76,0.06)" stroke-width="1"/>
  <line x1="200" y1="1080" x2="1200" y2="0" stroke="rgba(201,168,76,0.04)" stroke-width="1"/>
  <line x1="900" y1="1080" x2="1920" y2="200" stroke="rgba(99,102,241,0.04)" stroke-width="1"/>
  <line x1="1400" y1="1080" x2="1920" y2="600" stroke="rgba(201,168,76,0.03)" stroke-width="1"/>
  <!-- Subtle circles -->
  <circle cx="300" cy="200" r="200" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
  <circle cx="1600" cy="800" r="300" fill="none" stroke="rgba(201,168,76,0.03)" stroke-width="0.5"/>
</svg>
