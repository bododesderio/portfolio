name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Build-time only. The build does not connect to a database; Next needs
          # these present so config parsing and static analysis succeed.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXTAUTH_SECRET: ci-build-secret-not-used-at-runtime
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          ANALYTICS_SALT: ci-build-salt

  # Migration history must stay in sync with schema.prisma. This project
  # previously drifted because `prisma db push` applied changes without
  # recording them, which produced a database that a from-source deploy could
  # not reproduce. This job fails if anyone reintroduces that.
  migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply migrations to an empty database
        run: pnpm prisma migrate deploy

      - name: Fail if schema.prisma has drifted from migration history
        run: |
          DRIFT=$(pnpm prisma migrate diff \
            --from-url "$DATABASE_URL" \
            --to-schema-datamodel prisma/schema.prisma \
            --script 2>/dev/null | grep -v '^\s*$' | grep -v 'empty migration' || true)
          if [ -n "$DRIFT" ]; then
            echo "::error::schema.prisma does not match migration history."
            echo "Run: pnpm prisma migrate dev --name <describe_change>"
            echo "$DRIFT"
            exit 1
          fi
          echo "No drift."

      - name: Seed must succeed on a fresh database
        run: pnpm db:seed
        env:
          NEXTAUTH_SECRET: ci-seed-secret
          ADMIN_EMAIL: ci@example.com
