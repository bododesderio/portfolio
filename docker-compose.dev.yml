services:
  db:
    image: postgres:16-alpine
    container_name: bodo_db_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bodo_portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-bodo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bodo} -d ${POSTGRES_DB:-bodo_portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bodo_app_dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bodo}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-bodo_portfolio}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - uploads_dev_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_dev_data:
  uploads_dev_data:
